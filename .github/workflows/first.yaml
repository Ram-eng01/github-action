name: Sysytem info and multiple jobs

on: [ push ]

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Print host name
        run: hostname

      - name: kernel info
        run: uname -r

      - name: show OS info
        run: cat /etc/os-release

  files:
    runs-on: ubuntu-latest
    steps:
      - name: create-file
        run: echo "KK FUNDA TEST FILE" > demo.txt

      - name: Show file content
        run: cat demo.txt

      - name: List directory
        run: ls -l

  env-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Print predefined env
        run: echo "repo name is $GITHUB_REPOSITORY"

      - name: set and print custom env
        run: |
          MYNAME="Rammohan"
          echo "My name is $MYNAME"

  strings:
    runs-on: ubuntu-latest
    steps:
      - name: convert to uppercase
        run: echo "kk funda" | tr 'a-z' 'A-Z'
      - name: Word count
        run: echo "GitHub Actions Training" | wc -w
  